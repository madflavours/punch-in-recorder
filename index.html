<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Office / WFH Recorder</title>
    <style>
      :root {
        color-scheme: light;
        --page: #f5f6f8;
        --surface: #ffffff;
        --text: #171717;
        --muted: #6b7280;
        --line: #d8dde5;
        --office: #1f8f55;
        --office-dark: #15663d;
        --wfh: #2563eb;
        --wfh-dark: #1d4ed8;
        --shadow: 0 16px 40px rgba(23, 23, 23, 0.08);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background: var(--page);
        color: var(--text);
      }

      button {
        font: inherit;
      }

      .app-shell {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      .toolbar {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 20px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 2.1rem;
        line-height: 1.15;
      }

      .month-controls,
      .mode-row,
      .summary {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .icon-button,
      .today-button,
      .mode-button {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease;
      }

      .icon-button:hover,
      .today-button:hover,
      .mode-button:hover {
        transform: translateY(-1px);
        border-color: #aab3c2;
      }

      .icon-button {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 8px;
        font-size: 1.3rem;
        font-weight: 800;
      }

      .today-button,
      .mode-button {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 8px;
        padding: 0 14px;
        font-weight: 700;
      }

      .mode-row {
        margin-bottom: 18px;
      }

      .mode-button {
        min-width: 128px;
      }

      .mode-button.office.active {
        border-color: var(--office);
        background: var(--office);
        color: #ffffff;
      }

      .mode-button.wfh.active {
        border-color: var(--wfh);
        background: var(--wfh);
        color: #ffffff;
      }

      .calendar-wrap {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .calendar-heading {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        padding: 22px;
        border-bottom: 1px solid var(--line);
      }

      .calendar-heading h2 {
        font-size: 1.45rem;
      }

      .calendar-heading p {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .weekdays,
      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }

      .weekdays {
        border-bottom: 1px solid var(--line);
        background: #f9fafb;
      }

      .weekdays span {
        padding: 12px 10px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
        text-align: center;
      }

      .calendar-grid {
        background: var(--line);
        gap: 1px;
      }

      .day {
        position: relative;
        display: flex;
        min-height: 112px;
        flex-direction: column;
        align-items: flex-start;
        justify-content: space-between;
        border: 0;
        background: #ffffff;
        color: #111827;
        cursor: pointer;
        padding: 12px;
        text-align: left;
      }

      .day.empty {
        cursor: default;
        background: #f7f8fa;
      }

      .day:not(.empty):hover {
        outline: 2px solid #111827;
        outline-offset: -2px;
      }

      .day.office {
        background: var(--office);
        color: #ffffff;
      }

      .day.wfh {
        background: var(--wfh);
        color: #ffffff;
      }

      .day.today::after {
        position: absolute;
        right: 10px;
        top: 10px;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: currentColor;
        content: "";
      }

      .date-number {
        font-size: 1.15rem;
        font-weight: 800;
      }

      .status-label {
        align-self: flex-end;
        font-size: 0.82rem;
        font-weight: 800;
      }

      .summary {
        margin-top: 18px;
        flex-wrap: wrap;
      }

      .summary-item {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 0 14px;
      }

      .summary-item strong {
        font-size: 1.05rem;
      }

      .summary-item.muted {
        color: var(--muted);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .office-dot {
        background: var(--office-dark);
      }

      .wfh-dot {
        background: var(--wfh-dark);
      }

      .empty-dot {
        border: 1px solid #9ca3af;
        background: #ffffff;
      }

      @media (max-width: 760px) {
        .app-shell {
          width: min(100% - 20px, 1040px);
          padding: 20px 0;
        }

        .toolbar,
        .calendar-heading {
          align-items: stretch;
          flex-direction: column;
        }

        h1 {
          font-size: 1.65rem;
        }

        .month-controls,
        .mode-row {
          width: 100%;
        }

        .today-button {
          flex: 1;
        }

        .mode-button {
          flex: 1;
          min-width: 0;
        }

        .weekdays span {
          padding: 10px 2px;
          font-size: 0.72rem;
        }

        .day {
          min-height: 72px;
          padding: 8px;
        }

        .date-number {
          font-size: 0.98rem;
        }

        .status-label {
          font-size: 0.68rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar" aria-label="Calendar controls">
        <div>
          <p class="eyebrow">Personal tracker</p>
          <h1>Office / WFH Recorder</h1>
        </div>

        <div class="month-controls">
          <button class="icon-button" id="previousMonth" type="button" aria-label="Previous month">
            <span aria-hidden="true">‹</span>
          </button>
          <button class="today-button" id="todayButton" type="button">
            <span aria-hidden="true">▣</span>
            Today
          </button>
          <button class="icon-button" id="nextMonth" type="button" aria-label="Next month">
            <span aria-hidden="true">›</span>
          </button>
        </div>
      </section>

      <section class="mode-row" aria-label="Work location">
        <button class="mode-button office active" id="officeMode" type="button" data-mode="office">
          <span aria-hidden="true">■</span>
          Office
        </button>
        <button class="mode-button wfh" id="wfhMode" type="button" data-mode="wfh">
          <span aria-hidden="true">■</span>
          WFH
        </button>
      </section>

      <section class="calendar-wrap" id="calendar" aria-label="Monthly calendar">
        <div class="calendar-heading">
          <h2 id="monthLabel"></h2>
          <p id="helperText">Loading saved days...</p>
        </div>

        <div class="weekdays" aria-hidden="true">
          <span>Sun</span>
          <span>Mon</span>
          <span>Tue</span>
          <span>Wed</span>
          <span>Thu</span>
          <span>Fri</span>
          <span>Sat</span>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>
      </section>

      <section class="summary" aria-label="Monthly summary">
        <div class="summary-item">
          <span class="dot office-dot"></span>
          <strong id="officeCount">0</strong>
          <span>Office</span>
        </div>
        <div class="summary-item">
          <span class="dot wfh-dot"></span>
          <strong id="wfhCount">0</strong>
          <span>WFH</span>
        </div>
        <div class="summary-item muted">
          <span class="dot empty-dot"></span>
          <strong id="unmarkedCount">0</strong>
          <span>Unmarked</span>
        </div>
      </section>
    </main>
    <script>
      const DB_NAME = "office-wfh-recorder";
      const STORE_NAME = "day-records";
      const STATUS = {
        OFFICE: "office",
        WFH: "wfh",
      };

      let activeMonth = new Date();
      let selectedMode = STATUS.OFFICE;
      let records = {};

      const elements = {
        calendar: document.querySelector("#calendar"),
        calendarGrid: document.querySelector("#calendarGrid"),
        helperText: document.querySelector("#helperText"),
        monthLabel: document.querySelector("#monthLabel"),
        nextMonth: document.querySelector("#nextMonth"),
        officeCount: document.querySelector("#officeCount"),
        officeMode: document.querySelector("#officeMode"),
        previousMonth: document.querySelector("#previousMonth"),
        todayButton: document.querySelector("#todayButton"),
        unmarkedCount: document.querySelector("#unmarkedCount"),
        wfhCount: document.querySelector("#wfhCount"),
        wfhMode: document.querySelector("#wfhMode"),
      };

      function openDatabase() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, 1);

          request.onupgradeneeded = () => {
            request.result.createObjectStore(STORE_NAME, { keyPath: "date" });
          };

          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      async function getRecords() {
        const db = await openDatabase();

        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, "readonly");
          const request = tx.objectStore(STORE_NAME).getAll();

          request.onsuccess = () => {
            const nextRecords = {};
            request.result.forEach((record) => {
              nextRecords[record.date] = record.status;
            });
            resolve(nextRecords);
          };
          request.onerror = () => reject(request.error);
          tx.oncomplete = () => db.close();
        });
      }

      async function saveRecord(date, status) {
        const db = await openDatabase();

        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, "readwrite");
          const store = tx.objectStore(STORE_NAME);

          if (status) {
            store.put({ date, status });
          } else {
            store.delete(date);
          }

          tx.oncomplete = () => {
            db.close();
            resolve();
          };
          tx.onerror = () => reject(tx.error);
        });
      }

      function toDateKey(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");

        return `${year}-${month}-${day}`;
      }

      function getMonthDays(monthDate) {
        const year = monthDate.getFullYear();
        const month = monthDate.getMonth();
        const firstDate = new Date(year, month, 1);
        const lastDate = new Date(year, month + 1, 0);
        const days = [];

        for (let i = 0; i < firstDate.getDay(); i += 1) {
          days.push(null);
        }

        for (let day = 1; day <= lastDate.getDate(); day += 1) {
          days.push(new Date(year, month, day));
        }

        while (days.length % 7 !== 0) {
          days.push(null);
        }

        return days;
      }

      function formatMonth(date) {
        return new Intl.DateTimeFormat("en", { month: "long", year: "numeric" }).format(date);
      }

      function setSelectedMode(mode) {
        selectedMode = mode;
        elements.officeMode.classList.toggle("active", selectedMode === STATUS.OFFICE);
        elements.wfhMode.classList.toggle("active", selectedMode === STATUS.WFH);
      }

      async function updateDay(date) {
        const key = toDateKey(date);
        const nextStatus = records[key] === selectedMode ? null : selectedMode;

        if (nextStatus) {
          records[key] = nextStatus;
        } else {
          delete records[key];
        }

        render();
        await saveRecord(key, nextStatus);
      }

      function changeMonth(offset) {
        activeMonth = new Date(activeMonth.getFullYear(), activeMonth.getMonth() + offset, 1);
        render();
      }

      function render() {
        const days = getMonthDays(activeMonth);
        const monthKeys = days.filter(Boolean).map(toDateKey);
        const officeCount = monthKeys.filter((key) => records[key] === STATUS.OFFICE).length;
        const wfhCount = monthKeys.filter((key) => records[key] === STATUS.WFH).length;
        const unmarkedCount = monthKeys.length - officeCount - wfhCount;
        const monthLabel = formatMonth(activeMonth);

        elements.monthLabel.textContent = monthLabel;
        elements.calendar.setAttribute("aria-label", `${monthLabel} calendar`);
        elements.officeCount.textContent = officeCount;
        elements.wfhCount.textContent = wfhCount;
        elements.unmarkedCount.textContent = unmarkedCount;
        elements.calendarGrid.replaceChildren();

        days.forEach((date) => {
          if (!date) {
            const emptyDay = document.createElement("div");
            emptyDay.className = "day empty";
            elements.calendarGrid.append(emptyDay);
            return;
          }

          const key = toDateKey(date);
          const status = records[key];
          const dayButton = document.createElement("button");
          const dateNumber = document.createElement("span");

          dayButton.className = `day ${status || ""} ${key === toDateKey(new Date()) ? "today" : ""}`;
          dayButton.type = "button";
          dayButton.setAttribute("aria-label", `${date.getDate()} ${monthLabel}${status ? `, ${status}` : ""}`);
          dayButton.addEventListener("click", () => updateDay(date));

          dateNumber.className = "date-number";
          dateNumber.textContent = date.getDate();
          dayButton.append(dateNumber);

          if (status) {
            const statusLabel = document.createElement("span");
            statusLabel.className = "status-label";
            statusLabel.textContent = status === STATUS.OFFICE ? "Office" : "WFH";
            dayButton.append(statusLabel);
          }

          elements.calendarGrid.append(dayButton);
        });
      }

      elements.previousMonth.addEventListener("click", () => changeMonth(-1));
      elements.nextMonth.addEventListener("click", () => changeMonth(1));
      elements.todayButton.addEventListener("click", () => {
        activeMonth = new Date();
        render();
      });
      elements.officeMode.addEventListener("click", () => setSelectedMode(STATUS.OFFICE));
      elements.wfhMode.addEventListener("click", () => setSelectedMode(STATUS.WFH));

      getRecords()
        .then((storedRecords) => {
          records = storedRecords;
        })
        .catch(() => {
          elements.helperText.textContent = "Saved days could not be loaded in this browser.";
        })
        .finally(() => {
          if (elements.helperText.textContent === "Loading saved days...") {
            elements.helperText.textContent = "Click a date to mark it. Click the same date again to clear it.";
          }
          render();
        });
    </script>
  </body>
</html>
