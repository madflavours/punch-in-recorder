<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Office / WFH Recorder</title>
    <style>
      :root {
        color-scheme: light;
        --page: #f5f6f8;
        --surface: #ffffff;
        --text: #171717;
        --muted: #6b7280;
        --line: #d8dde5;
        --wfh: #facc15;
        --wfh-line: #d4a806;
        --second-shift: #dc2626;
        --comp-off: #2563eb;
        --expensify: #16a34a;
        --shadow: 0 16px 40px rgba(23, 23, 23, 0.08);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background: var(--page);
        color: var(--text);
      }

      button {
        font: inherit;
      }

      .app-shell {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      .toolbar {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 20px;
      }

      .eyebrow {
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 700;
        text-transform: uppercase;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 2.1rem;
        line-height: 1.15;
      }

      .month-controls,
      .controls-panel,
      .label-row,
      .summary {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .icon-button,
      .today-button,
      .marker-button {
        border: 1px solid var(--line);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        transition: transform 160ms ease, border-color 160ms ease, background 160ms ease, box-shadow 160ms ease;
      }

      .icon-button:hover,
      .today-button:hover,
      .marker-button:hover {
        transform: translateY(-1px);
        border-color: #aab3c2;
      }

      .icon-button {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border-radius: 8px;
        font-size: 1.3rem;
        font-weight: 800;
      }

      .today-button,
      .marker-button {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border-radius: 8px;
        padding: 0 14px;
        font-weight: 700;
      }

      .controls-panel {
        align-items: flex-end;
        flex-wrap: wrap;
        margin-bottom: 18px;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 7px;
      }

      .labels-group {
        flex: 1;
        min-width: 280px;
      }

      .control-label {
        color: var(--muted);
        font-size: 0.78rem;
        font-weight: 800;
        text-transform: uppercase;
      }

      .label-row {
        flex-wrap: wrap;
      }

      .marker-button.active {
        border-color: #111827;
        box-shadow: inset 0 0 0 2px #111827;
      }

      .marker-button.wfh-action.active {
        border-color: var(--wfh-line);
        background: var(--wfh);
        color: #111827;
      }

      .marker-button.second-shift-action.active {
        border-color: var(--second-shift);
        background: #fff1f1;
      }

      .marker-button.comp-off-action.active {
        border-color: var(--comp-off);
        background: #eff6ff;
      }

      .marker-button.expensify-action.active {
        border-color: var(--expensify);
        background: #ecfdf3;
      }

      .marker-button.clear-action.active {
        border-color: #111827;
        background: #111827;
        color: #ffffff;
      }

      .swatch {
        width: 12px;
        height: 12px;
        border-radius: 3px;
        border: 1px solid rgba(17, 24, 39, 0.18);
      }

      .wfh-swatch {
        background: var(--wfh);
      }

      .star-icon {
        font-size: 1rem;
        line-height: 1;
      }

      .second-shift-star {
        color: var(--second-shift);
      }

      .comp-off-star {
        color: var(--comp-off);
      }

      .expensify-star {
        color: var(--expensify);
      }

      .calendar-wrap {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: var(--shadow);
      }

      .calendar-heading {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        padding: 22px;
        border-bottom: 1px solid var(--line);
      }

      .calendar-heading h2 {
        font-size: 1.45rem;
      }

      .calendar-heading p {
        color: var(--muted);
        font-size: 0.95rem;
      }

      .weekdays,
      .calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
      }

      .weekdays {
        border-bottom: 1px solid var(--line);
        background: #f9fafb;
      }

      .weekdays span {
        padding: 12px 10px;
        color: var(--muted);
        font-size: 0.82rem;
        font-weight: 800;
        text-align: center;
      }

      .calendar-grid {
        background: var(--line);
        gap: 1px;
      }

      .day {
        position: relative;
        display: flex;
        min-height: 112px;
        flex-direction: column;
        align-items: flex-start;
        justify-content: space-between;
        border: 0;
        background: #ffffff;
        color: #111827;
        cursor: pointer;
        padding: 12px;
        text-align: left;
      }

      .day.empty {
        cursor: default;
        background: #f7f8fa;
      }

      .day:not(.empty):hover {
        outline: 2px solid #111827;
        outline-offset: -2px;
      }

      .day.wfh {
        background: var(--wfh);
        color: #111827;
      }

      .day.today::after {
        position: absolute;
        right: 10px;
        top: 10px;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: currentColor;
        content: "";
      }

      .date-number {
        font-size: 1.15rem;
        font-weight: 800;
      }

      .day-footer {
        display: flex;
        width: 100%;
        align-items: flex-end;
        justify-content: space-between;
        gap: 8px;
      }

      .tag-stars {
        display: flex;
        min-height: 22px;
        flex-wrap: wrap;
        align-items: center;
        gap: 4px;
      }

      .tag-star {
        font-size: 1.22rem;
        font-weight: 900;
        line-height: 1;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.5);
      }

      .wfh-badge {
        border: 1px solid rgba(17, 24, 39, 0.35);
        border-radius: 6px;
        padding: 2px 6px;
        font-size: 0.72rem;
        font-weight: 900;
        line-height: 1.2;
      }

      .summary {
        margin-top: 18px;
        flex-wrap: wrap;
      }

      .summary-item {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        padding: 0 14px;
      }

      .summary-item strong {
        font-size: 1.05rem;
      }

      .summary-star {
        font-size: 1rem;
        line-height: 1;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
      }

      .office-dot {
        border: 1px solid #9ca3af;
        background: #ffffff;
      }

      .wfh-dot {
        border: 1px solid var(--wfh-line);
        background: var(--wfh);
      }

      @media (max-width: 760px) {
        .app-shell {
          width: min(100% - 20px, 1040px);
          padding: 20px 0;
        }

        .toolbar,
        .calendar-heading {
          align-items: stretch;
          flex-direction: column;
        }

        h1 {
          font-size: 1.65rem;
        }

        .month-controls,
        .controls-panel,
        .label-row {
          width: 100%;
        }

        .today-button,
        .marker-button {
          flex: 1;
        }

        .control-group,
        .labels-group {
          width: 100%;
          min-width: 0;
        }

        .weekdays span {
          padding: 10px 2px;
          font-size: 0.72rem;
        }

        .day {
          min-height: 78px;
          padding: 8px;
        }

        .date-number {
          font-size: 0.98rem;
        }

        .tag-star {
          font-size: 1rem;
        }

        .wfh-badge {
          padding: 2px 5px;
          font-size: 0.64rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar" aria-label="Calendar controls">
        <div>
          <p class="eyebrow">Personal tracker</p>
          <h1>Office / WFH Recorder</h1>
        </div>

        <div class="month-controls">
          <button class="icon-button" id="previousMonth" type="button" aria-label="Previous month">
            <span aria-hidden="true">‹</span>
          </button>
          <button class="today-button" id="todayButton" type="button">
            <span aria-hidden="true">▣</span>
            Today
          </button>
          <button class="icon-button" id="nextMonth" type="button" aria-label="Next month">
            <span aria-hidden="true">›</span>
          </button>
        </div>
      </section>

      <section class="controls-panel" aria-label="Marker controls">
        <div class="control-group">
          <p class="control-label">Day type</p>
          <button class="marker-button wfh-action active" id="wfhAction" type="button" data-action="wfh">
            <span class="swatch wfh-swatch" aria-hidden="true"></span>
            WFH
          </button>
        </div>

        <div class="control-group labels-group">
          <p class="control-label">Star labels</p>
          <div class="label-row">
            <button class="marker-button second-shift-action" id="secondShiftAction" type="button" data-action="secondShift">
              <span class="star-icon second-shift-star" aria-hidden="true">★</span>
              Second-Shift
            </button>
            <button class="marker-button comp-off-action" id="compOffAction" type="button" data-action="compOff">
              <span class="star-icon comp-off-star" aria-hidden="true">★</span>
              Comp-Off
            </button>
            <button class="marker-button expensify-action" id="expensifyAction" type="button" data-action="expensifyLogged">
              <span class="star-icon expensify-star" aria-hidden="true">★</span>
              Expensify-Logged
            </button>
          </div>
        </div>

        <div class="control-group">
          <p class="control-label">Edit</p>
          <button class="marker-button clear-action" id="clearAction" type="button" data-action="clear">Clear day</button>
        </div>
      </section>

      <section class="calendar-wrap" id="calendar" aria-label="Monthly calendar">
        <div class="calendar-heading">
          <h2 id="monthLabel"></h2>
          <p id="helperText">Selected: WFH</p>
        </div>

        <div class="weekdays" aria-hidden="true">
          <span>Sun</span>
          <span>Mon</span>
          <span>Tue</span>
          <span>Wed</span>
          <span>Thu</span>
          <span>Fri</span>
          <span>Sat</span>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>
      </section>

      <section class="summary" aria-label="Monthly summary">
        <div class="summary-item">
          <span class="dot office-dot"></span>
          <strong id="officeCount">0</strong>
          <span>Office</span>
        </div>
        <div class="summary-item">
          <span class="dot wfh-dot"></span>
          <strong id="wfhCount">0</strong>
          <span>WFH</span>
        </div>
        <div class="summary-item">
          <span class="summary-star second-shift-star" aria-hidden="true">★</span>
          <strong id="secondShiftCount">0</strong>
          <span>Second-Shift</span>
        </div>
        <div class="summary-item">
          <span class="summary-star comp-off-star" aria-hidden="true">★</span>
          <strong id="compOffCount">0</strong>
          <span>Comp-Off</span>
        </div>
        <div class="summary-item">
          <span class="summary-star expensify-star" aria-hidden="true">★</span>
          <strong id="expensifyCount">0</strong>
          <span>Expensify</span>
        </div>
      </section>
    </main>

    <script>
      const DB_NAME = "office-wfh-recorder";
      const STORE_NAME = "day-records";
      const WFH_ACTION = "wfh";
      const CLEAR_ACTION = "clear";
      const TAGS = [
        { id: "secondShift", label: "Second-Shift", className: "second-shift-star" },
        { id: "compOff", label: "Comp-Off", className: "comp-off-star" },
        { id: "expensifyLogged", label: "Expensify-Logged", className: "expensify-star" },
      ];
      const TAG_IDS = TAGS.map((tag) => tag.id);
      const ACTION_LABELS = {
        [WFH_ACTION]: "WFH",
        [CLEAR_ACTION]: "Clear day",
        secondShift: "Second-Shift",
        compOff: "Comp-Off",
        expensifyLogged: "Expensify-Logged",
      };

      let activeMonth = new Date();
      let activeAction = WFH_ACTION;
      let records = {};

      const elements = {
        actionButtons: document.querySelectorAll("[data-action]"),
        calendar: document.querySelector("#calendar"),
        calendarGrid: document.querySelector("#calendarGrid"),
        compOffCount: document.querySelector("#compOffCount"),
        expensifyCount: document.querySelector("#expensifyCount"),
        helperText: document.querySelector("#helperText"),
        monthLabel: document.querySelector("#monthLabel"),
        nextMonth: document.querySelector("#nextMonth"),
        officeCount: document.querySelector("#officeCount"),
        previousMonth: document.querySelector("#previousMonth"),
        secondShiftCount: document.querySelector("#secondShiftCount"),
        todayButton: document.querySelector("#todayButton"),
        wfhCount: document.querySelector("#wfhCount"),
      };

      function openDatabase() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(DB_NAME, 1);

          request.onupgradeneeded = () => {
            request.result.createObjectStore(STORE_NAME, { keyPath: "date" });
          };

          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      }

      function normalizeRecord(record) {
        const selectedTags = Array.isArray(record?.tags)
          ? record.tags.filter((tagId, index, tags) => TAG_IDS.includes(tagId) && tags.indexOf(tagId) === index)
          : [];

        return {
          wfh: Boolean(record?.wfh || record?.status === "wfh"),
          tags: selectedTags,
        };
      }

      function hasRecordValue(record) {
        return Boolean(record?.wfh || record?.tags?.length);
      }

      async function getRecords() {
        const db = await openDatabase();

        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, "readonly");
          const request = tx.objectStore(STORE_NAME).getAll();

          request.onsuccess = () => {
            const nextRecords = {};
            request.result.forEach((record) => {
              const normalized = normalizeRecord(record);
              if (hasRecordValue(normalized)) {
                nextRecords[record.date] = normalized;
              }
            });
            resolve(nextRecords);
          };
          request.onerror = () => reject(request.error);
          tx.oncomplete = () => db.close();
        });
      }

      async function saveRecord(date, record) {
        const db = await openDatabase();
        const normalized = normalizeRecord(record);

        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, "readwrite");
          const store = tx.objectStore(STORE_NAME);

          if (hasRecordValue(normalized)) {
            store.put({ date, wfh: normalized.wfh, tags: normalized.tags });
          } else {
            store.delete(date);
          }

          tx.oncomplete = () => {
            db.close();
            resolve();
          };
          tx.onerror = () => reject(tx.error);
        });
      }

      function toDateKey(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");

        return `${year}-${month}-${day}`;
      }

      function getMonthDays(monthDate) {
        const year = monthDate.getFullYear();
        const month = monthDate.getMonth();
        const firstDate = new Date(year, month, 1);
        const lastDate = new Date(year, month + 1, 0);
        const days = [];

        for (let i = 0; i < firstDate.getDay(); i += 1) {
          days.push(null);
        }

        for (let day = 1; day <= lastDate.getDate(); day += 1) {
          days.push(new Date(year, month, day));
        }

        while (days.length % 7 !== 0) {
          days.push(null);
        }

        return days;
      }

      function formatMonth(date) {
        return new Intl.DateTimeFormat("en", { month: "long", year: "numeric" }).format(date);
      }

      function setActiveAction(action) {
        activeAction = action;
        elements.actionButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.action === activeAction);
        });
        elements.helperText.textContent = `Selected: ${ACTION_LABELS[activeAction]}`;
      }

      async function updateDay(date) {
        const key = toDateKey(date);

        if (activeAction === CLEAR_ACTION) {
          delete records[key];
          render();
          await saveRecord(key, null);
          return;
        }

        const current = normalizeRecord(records[key]);

        if (activeAction === WFH_ACTION) {
          current.wfh = !current.wfh;
        } else if (TAG_IDS.includes(activeAction)) {
          current.tags = current.tags.includes(activeAction)
            ? current.tags.filter((tagId) => tagId !== activeAction)
            : [...current.tags, activeAction];
        }

        if (hasRecordValue(current)) {
          records[key] = current;
        } else {
          delete records[key];
        }

        render();
        await saveRecord(key, records[key]);
      }

      function changeMonth(offset) {
        activeMonth = new Date(activeMonth.getFullYear(), activeMonth.getMonth() + offset, 1);
        render();
      }

      function getDayLabel(date, monthLabel, record) {
        const labels = [`${date.getDate()} ${monthLabel}`];

        if (record.wfh) {
          labels.push("WFH");
        } else {
          labels.push("Office");
        }

        TAGS.forEach((tag) => {
          if (record.tags.includes(tag.id)) {
            labels.push(tag.label);
          }
        });

        return labels.join(", ");
      }

      function renderStars(record) {
        const starWrap = document.createElement("span");
        starWrap.className = "tag-stars";

        TAGS.forEach((tag) => {
          if (!record.tags.includes(tag.id)) {
            return;
          }

          const star = document.createElement("span");
          star.className = `tag-star ${tag.className}`;
          star.textContent = "★";
          star.title = tag.label;
          star.setAttribute("aria-hidden", "true");
          starWrap.append(star);
        });

        return starWrap;
      }

      function render() {
        const days = getMonthDays(activeMonth);
        const monthKeys = days.filter(Boolean).map(toDateKey);
        const monthRecords = monthKeys.map((key) => normalizeRecord(records[key]));
        const wfhCount = monthRecords.filter((record) => record.wfh).length;
        const secondShiftCount = monthRecords.filter((record) => record.tags.includes("secondShift")).length;
        const compOffCount = monthRecords.filter((record) => record.tags.includes("compOff")).length;
        const expensifyCount = monthRecords.filter((record) => record.tags.includes("expensifyLogged")).length;
        const monthLabel = formatMonth(activeMonth);

        elements.monthLabel.textContent = monthLabel;
        elements.calendar.setAttribute("aria-label", `${monthLabel} calendar`);
        elements.officeCount.textContent = monthKeys.length - wfhCount;
        elements.wfhCount.textContent = wfhCount;
        elements.secondShiftCount.textContent = secondShiftCount;
        elements.compOffCount.textContent = compOffCount;
        elements.expensifyCount.textContent = expensifyCount;
        elements.calendarGrid.replaceChildren();

        days.forEach((date) => {
          if (!date) {
            const emptyDay = document.createElement("div");
            emptyDay.className = "day empty";
            elements.calendarGrid.append(emptyDay);
            return;
          }

          const key = toDateKey(date);
          const record = normalizeRecord(records[key]);
          const dayButton = document.createElement("button");
          const dateNumber = document.createElement("span");
          const hasFooter = record.wfh || record.tags.length > 0;

          dayButton.className = `day ${record.wfh ? "wfh" : ""} ${key === toDateKey(new Date()) ? "today" : ""}`;
          dayButton.type = "button";
          dayButton.setAttribute("aria-label", getDayLabel(date, monthLabel, record));
          dayButton.addEventListener("click", () => updateDay(date));

          dateNumber.className = "date-number";
          dateNumber.textContent = date.getDate();
          dayButton.append(dateNumber);

          if (hasFooter) {
            const footer = document.createElement("span");
            footer.className = "day-footer";
            footer.append(renderStars(record));

            if (record.wfh) {
              const wfhBadge = document.createElement("span");
              wfhBadge.className = "wfh-badge";
              wfhBadge.textContent = "WFH";
              footer.append(wfhBadge);
            }

            dayButton.append(footer);
          }

          elements.calendarGrid.append(dayButton);
        });
      }

      elements.previousMonth.addEventListener("click", () => changeMonth(-1));
      elements.nextMonth.addEventListener("click", () => changeMonth(1));
      elements.todayButton.addEventListener("click", () => {
        activeMonth = new Date();
        render();
      });
      elements.actionButtons.forEach((button) => {
        button.addEventListener("click", () => setActiveAction(button.dataset.action));
      });

      getRecords()
        .then((storedRecords) => {
          records = storedRecords;
        })
        .catch(() => {
          elements.helperText.textContent = "Saved days could not be loaded in this browser.";
        })
        .finally(() => {
          setActiveAction(WFH_ACTION);
          render();
        });
    </script>
  </body>
</html>
